<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyProfitR — Legal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0d0f1a;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;

      padding: 40px 20px;

      border-radius: 12px;

    .card h2 { font-size: 1.05rem; color: #e8e8f0; margin-bottom: 8px; }
    .card p { color: #8a8ba0; font-size: 0.88rem; line-height: 1.6; margin-bottom: 20px; }

      display: inline-block;
      background: #00e5c8;

      font-weight: 700;
      font-size: 0.95rem;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
